services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    # Optional - specify the uid and gid you would like Jellyfin to use instead of root
    user: 1000:1000
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - ./data/config:/config
      - ./data/cache:/cache
      - type: bind
        source: ./data/music
        target: /music
      # Optional - extra fonts to be used during transcoding with subtitle burn-in
      # - type: bind
      #   source: ./data/fonts
      #   target: /usr/local/share/fonts/custom
      #   read_only: true
    restart: 'unless-stopped'
    # Optional - alternative address used for autodiscovery
    # environment:
    #   - JELLYFIN_PublishedServerUrl=http://example.com
    # Optional - may be necessary for docker healthcheck to pass if running in host network mode
    extra_hosts:
      - 'host.docker.internal:host-gateway'
  cloudflared:
    image: cloudflare/cloudflared
    container_name: jellyfin_cloudflared
    env_file: '.env_docker'
    hostname: calibarn-jelly
    restart: 'unless-stopped'
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'
    network_mode: 'host'
    command: tunnel run
    # Health check configuration to verify Cloudflare Tunnel readiness
    healthcheck:
      test: ['CMD', 'cloudflared', '--version']       # Check if cloudflared version command works
      interval: 30s                                   # Time between health check attempts
      timeout: 10s                                    # Time to wait for a response
      retries: 3                                      # Number of retries before marking as unhealthy
      start_period: 10s                               # Delay before health checks begin
    # Container labels for additional metadata
    labels:
      - 'com.centurylinklabs.watchtower.enable=true'  # Enable automatic updates with Watchtower
